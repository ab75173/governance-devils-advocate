services:
  - type: web
    name: governance-devils-advocate
    runtime: python
    plan: free
    region: oregon
    buildCommand: pip install -r requirements.txt
    startCommand: python -m src.server
    healthCheckPath: /mcp/
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.3"
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: LOG_LEVEL
        value: INFO
